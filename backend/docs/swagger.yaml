basePath: /
definitions:
  models.AuthResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  models.LoginRequest:
    properties:
      password:
        example: "123456"
        type: string
      username:
        example: testuser
        type: string
    required:
    - password
    - username
    type: object
  models.RegisterRequest:
    properties:
      email:
        example: test@example.com
        type: string
      password:
        example: "123456"
        minLength: 6
        type: string
      role:
        enum:
        - user
        - seller
        example: user
        type: string
      username:
        example: testuser
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  models.Response:
    properties:
      code:
        example: 200
        type: integer
      data: {}
      message:
        example: success
        type: string
    type: object
  models.User:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      email:
        example: test@example.com
        type: string
      id:
        example: 1
        type: integer
      role:
        allOf:
        - $ref: '#/definitions/models.UserRole'
        example: user
      updated_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      username:
        example: testuser
        type: string
    type: object
  models.UserRole:
    enum:
    - user
    - seller
    - admin
    type: string
    x-enum-varnames:
    - RoleUser
    - RoleSeller
    - RoleAdmin
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: 抖音电商AI全栈课题 - 直播竞拍全栈系统
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: 直播竞拍系统 API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 用户使用用户名和密码登录，返回JWT Token
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/models.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.AuthResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/models.Response'
        "401":
          description: 认证失败
          schema:
            $ref: '#/definitions/models.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/models.Response'
      summary: 用户登录
      tags:
      - 认证
  /api/v1/auth/me:
    get:
      consumes:
      - application/json
      description: 获取当前登录用户的详细信息
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/models.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.User'
              type: object
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/models.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/models.Response'
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - 认证
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: 创建新用户账号，支持普通用户和商家角色
      parameters:
      - description: 注册信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 注册成功
          schema:
            allOf:
            - $ref: '#/definitions/models.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.AuthResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/models.Response'
        "409":
          description: 用户已存在
          schema:
            $ref: '#/definitions/models.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/models.Response'
      summary: 用户注册
      tags:
      - 认证
  /health:
    get:
      consumes:
      - application/json
      description: 检查服务是否正常运行
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
      summary: 健康检查
      tags:
      - 系统
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
